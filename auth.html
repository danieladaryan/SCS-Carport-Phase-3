<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCS Carport Konfigurator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #F8F8F6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .logo {
      width: 56px; height: 56px;
      background: #F5C800;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
    }
    h1 { font-size: 22px; font-weight: 700; color: #1A1A18; margin-bottom: 6px; }
    p { font-size: 14px; color: #7A7670; margin-bottom: 28px; }
    input {
      width: 100%;
      border: 1.5px solid #E4E1DB;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.15s;
      text-align: center;
      letter-spacing: 0.1em;
    }
    input:focus { border-color: #F5C800; }
    button {
      width: 100%;
      background: #F5C800;
      color: #1A1A18;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #D9A800; }
    .error {
      color: #c0392b;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🏠</div>
    <h1>SCS Carport Konfigurator</h1>
    <p>Bitte geben Sie das Passwort ein, um fortzufahren.</p>
    <input type="password" id="pw" placeholder="Passwort" onkeydown="if(event.key==='Enter')check()">
    <button onclick="check()">Weiter →</button>
    <div class="error" id="err">Falsches Passwort. Bitte versuchen Sie es erneut.</div>
  </div>
  <script>
    if (sessionStorage.getItem('scs_auth') === '1') {
      window.location.href = 'index.html';
    }
    function check() {
      const val = document.getElementById('pw').value;
      if (val === 'builditphase3') {
        sessionStorage.setItem('scs_auth', '1');
        window.location.href = 'index.html';
      } else {
        document.getElementById('err').style.display = 'block';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
      }
    }
  </script>
</body>
</html>
